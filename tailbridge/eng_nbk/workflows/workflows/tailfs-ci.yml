name: TailFS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'tail-agent-file-send/**'
  pull_request:
    branches: [main]
    paths:
      - 'tail-agent-file-send/**'

env:
  GO_VERSION: '1.25'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Build tailfs
        run: go build -v ./cmd/tailfs/...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./tail-agent-file-send/coverage.out
          flags: tailfs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: tail-agent-file-send
          args: --timeout=5m

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -v -tags=integration ./...

  release:
    name: Release
    needs: [build, test, lint, vet]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: tail-agent-file-send

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o tailfs-linux-amd64 ./cmd/tailfs
          GOOS=darwin GOARCH=amd64 go build -o tailfs-darwin-amd64 ./cmd/tailfs
          GOOS=windows GOARCH=amd64 go build -o tailfs-windows-amd64.exe ./cmd/tailfs

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tail-agent-file-send/tailfs-linux-amd64
            tail-agent-file-send/tailfs-darwin-amd64
            tail-agent-file-send/tailfs-windows-amd64.exe
