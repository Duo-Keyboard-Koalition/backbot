version: '3.8'

services:
  # Agent 1 - Primary sender
  agent1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: tailbridge-agent1
    hostname: agent1
    environment:
      - AGENT_NAME=agent1
      - AGENT_CAPABILITIES=file_send,file_receive,chat,command
      - TS_AUTHKEY=${TS_AUTH_KEY_1:-}
      - TS_HOSTNAME=agent1
      - TS_ROUTES=
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - agent1_data:/var/lib/tailscale
      - agent1_appdata:/app/data
    networks:
      - test_platform
    ports:
      - "8081:8080"
      - "8011:8001"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Agent 2 - Primary receiver
  agent2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: tailbridge-agent2
    hostname: agent2
    environment:
      - AGENT_NAME=agent2
      - AGENT_CAPABILITIES=file_receive,chat,stream
      - TS_AUTHKEY=${TS_AUTH_KEY_2:-}
      - TS_HOSTNAME=agent2
      - TS_ROUTES=
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - agent2_data:/var/lib/tailscale
      - agent2_appdata:/app/data
    networks:
      - test_platform
    ports:
      - "8082:8080"
      - "8012:8001"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Agent 3 - Bidirectional agent
  agent3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: tailbridge-agent3
    hostname: agent3
    environment:
      - AGENT_NAME=agent3
      - AGENT_CAPABILITIES=file_send,file_receive,chat,command,stream
      - TS_AUTHKEY=${TS_AUTH_KEY_3:-}
      - TS_HOSTNAME=agent3
      - TS_ROUTES=
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - agent3_data:/var/lib/tailscale
      - agent3_appdata:/app/data
    networks:
      - test_platform
    ports:
      - "8083:8080"
      - "8013:8001"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Test orchestrator - runs tests against the agents
  test-runner:
    image: golang:1.25-alpine
    container_name: tailbridge-test-runner
    hostname: test-runner
    environment:
      - AGENT1_URL=http://agent1:8080
      - AGENT2_URL=http://agent2:8080
      - AGENT3_URL=http://agent3:8080
      - TS_AUTH_KEY_1=${TS_AUTH_KEY_1:-}
      - TS_AUTH_KEY_2=${TS_AUTH_KEY_2:-}
      - TS_AUTH_KEY_3=${TS_AUTH_KEY_3:-}
    volumes:
      - ..:/app
      - test_runner_go:/root/go
    working_dir: /app
    networks:
      - test_platform
    depends_on:
      agent1:
        condition: service_healthy
      agent2:
        condition: service_healthy
      agent3:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        go mod tidy &&
        echo 'Running integration tests...' &&
        go test ./integration/... -v -tags=integration -timeout=10m
      "
    restart: "no"

volumes:
  agent1_data:
    driver: local
  agent1_appdata:
    driver: local
  agent2_data:
    driver: local
  agent2_appdata:
    driver: local
  agent3_data:
    driver: local
  agent3_appdata:
    driver: local
  test_runner_go:
    driver: local

networks:
  test_platform:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
