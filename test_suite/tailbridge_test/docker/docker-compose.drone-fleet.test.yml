version: '3.8'

services:
  # Lead Drone - Orchestrator
  lead-drone:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: drone-fleet-lead
    hostname: lead-drone
    environment:
      - AGENT_NAME=lead-drone
      - DRONE_ROLE=lead
      - DRONE_ID=DRONE-LEAD-001
      - AGENT_CAPABILITIES=orchestrate,coordinate,task_assign,monitor
      - TS_AUTHKEY=${TS_AUTH_KEY:-}
      - TS_HOSTNAME=lead-drone
      - TS_EXTRA_ARGS=--accept-dns=false
      - INITIAL_BATTERY=100
      - POSITION_LAT=40.7580
      - POSITION_LON=-73.9855
      - POSITION_ALT=200
    volumes:
      - lead_drone_data:/var/lib/tailscale
      - lead_drone_logs:/app/logs
    networks:
      - drone_fleet
    ports:
      - "8081:8080"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Scout Drone - Aerial Survey
  scout-drone:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: drone-fleet-scout
    hostname: scout-drone
    environment:
      - AGENT_NAME=scout-drone
      - DRONE_ROLE=scout
      - DRONE_ID=DRONE-SCOUT-002
      - AGENT_CAPABILITIES=survey,mapping,reconnaissance
      - TS_AUTHKEY=${TS_AUTH_KEY:-}
      - TS_HOSTNAME=scout-drone
      - TS_EXTRA_ARGS=--accept-dns=false
      - INITIAL_BATTERY=95
      - POSITION_LAT=40.7590
      - POSITION_LON=-73.9845
      - POSITION_ALT=150
    volumes:
      - scout_drone_data:/var/lib/tailscale
      - scout_drone_logs:/app/logs
    networks:
      - drone_fleet
    ports:
      - "8082:8080"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Worker Drone - Delivery
  worker-drone:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: drone-fleet-worker
    hostname: worker-drone
    environment:
      - AGENT_NAME=worker-drone
      - DRONE_ROLE=worker
      - DRONE_ID=DRONE-WORKER-003
      - AGENT_CAPABILITIES=delivery,transport,payload_carry
      - TS_AUTHKEY=${TS_AUTH_KEY:-}
      - TS_HOSTNAME=worker-drone
      - TS_EXTRA_ARGS=--accept-dns=false
      - INITIAL_BATTERY=98
      - POSITION_LAT=40.7570
      - POSITION_LON=-73.9865
      - POSITION_ALT=100
    volumes:
      - worker_drone_data:/var/lib/tailscale
      - worker_drone_logs:/app/logs
    networks:
      - drone_fleet
    ports:
      - "8083:8080"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Relay Drone - Communication Relay
  relay-drone:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: drone-fleet-relay
    hostname: relay-drone
    environment:
      - AGENT_NAME=relay-drone
      - DRONE_ROLE=relay
      - DRONE_ID=DRONE-RELAY-004
      - AGENT_CAPABILITIES=relay,communication,signal_boost
      - TS_AUTHKEY=${TS_AUTH_KEY:-}
      - TS_HOSTNAME=relay-drone
      - TS_EXTRA_ARGS=--accept-dns=false
      - INITIAL_BATTERY=92
      - POSITION_LAT=40.7585
      - POSITION_LON=-73.9850
      - POSITION_ALT=180
    volumes:
      - relay_drone_data:/var/lib/tailscale
      - relay_drone_logs:/app/logs
    networks:
      - drone_fleet
    ports:
      - "8084:8080"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Test Runner
  test-runner:
    image: golang:1.25-alpine
    container_name: drone-fleet-test-runner
    hostname: test-runner
    environment:
      - LEAD_DRONE_URL=http://lead-drone:8080
      - DRONE1_URL=http://scout-drone:8080
      - DRONE2_URL=http://worker-drone:8080
      - DRONE3_URL=http://relay-drone:8080
      - TS_AUTH_KEY=${TS_AUTH_KEY:-}
    volumes:
      - ..:/app
      - test_runner_go:/root/go
    working_dir: /app
    networks:
      - drone_fleet
    depends_on:
      lead-drone:
        condition: service_healthy
      scout-drone:
        condition: service_healthy
      worker-drone:
        condition: service_healthy
      relay-drone:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        go mod tidy &&
        echo 'Running drone fleet integration tests...' &&
        go test ./integration/dronefleet/... -v -tags=integration -timeout=15m
      "
    restart: "no"

volumes:
  lead_drone_data:
    driver: local
  lead_drone_logs:
    driver: local
  scout_drone_data:
    driver: local
  scout_drone_logs:
    driver: local
  worker_drone_data:
    driver: local
  worker_drone_logs:
    driver: local
  relay_drone_data:
    driver: local
  relay_drone_logs:
    driver: local
  test_runner_go:
    driver: local

networks:
  drone_fleet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
