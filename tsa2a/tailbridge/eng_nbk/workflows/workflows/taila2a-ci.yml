name: Taila2a CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'tailbridge-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'tailbridge-service/**'

env:
  GO_VERSION: '1.25'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Build taila2a
        run: go build -v ./cmd/taila2a/...

      - name: Build bridge (legacy)
        run: go build -v ./bridge/...

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./tailbridge-service/coverage.out
          flags: taila2a

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: tailbridge-service
          args: --timeout=5m

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

  release:
    name: Release
    needs: [build, test, lint, vet]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: tailbridge-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o taila2a-linux-amd64 ./cmd/taila2a
          GOOS=darwin GOARCH=amd64 go build -o taila2a-darwin-amd64 ./cmd/taila2a
          GOOS=windows GOARCH=amd64 go build -o taila2a-windows-amd64.exe ./cmd/taila2a

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tailbridge-service/taila2a-linux-amd64
            tailbridge-service/taila2a-darwin-amd64
            tailbridge-service/taila2a-windows-amd64.exe
